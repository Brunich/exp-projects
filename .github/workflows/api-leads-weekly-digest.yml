name: Send weekly lead digest

on:
  schedule:
    # Mondays at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: api-leads-weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call weekly digest cron
        env:
          API_BASE_URL: ${{ secrets.LEADS_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.LEADS_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Skipping: set LEADS_API_BASE_URL and LEADS_CRON_SECRET repository secrets to enable scheduled digest."
            exit 0
          fi

          base_url="${API_BASE_URL%/}"
          endpoint="${base_url}/cron/weekly-digest?send=true"

          echo "Calling ${endpoint}"

          response_file="$(mktemp)"
          http_code="$(
            curl -sS -o "${response_file}" -w "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Accept: application/json" \
              "${endpoint}"
          )"

          echo "HTTP ${http_code}"
          cat "${response_file}"
          echo ""

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "Weekly digest cron request failed"
            exit 1
          fi

          lead_count="$(node -e "
            const fs = require('node:fs');
            const body = JSON.parse(fs.readFileSync('${response_file}', 'utf8'));
            process.stdout.write(String(body?.data?.digest?.currentWeek?.total ?? 0));
          ")"

          echo "Digest built for ${lead_count} lead(s) this week"
