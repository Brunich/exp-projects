name: Purge webhook dead letters

on:
  schedule:
    # Daily at 03:00 UTC — matches api-leads-capture README example
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: api-leads-purge-dead-letters
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call dead-letter purge cron
        env:
          API_BASE_URL: ${{ secrets.LEADS_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.LEADS_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Skipping: set LEADS_API_BASE_URL and LEADS_CRON_SECRET repository secrets to enable scheduled purge."
            exit 0
          fi

          base_url="${API_BASE_URL%/}"
          endpoint="${base_url}/cron/purge-dead-letters"

          echo "Calling ${endpoint}"

          response_file="$(mktemp)"
          http_code="$(
            curl -sS -o "${response_file}" -w "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Accept: application/json" \
              "${endpoint}"
          )"

          echo "HTTP ${http_code}"
          cat "${response_file}"
          echo ""

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "Cron purge request failed"
            exit 1
          fi

          purged_count="$(node -e "
            const fs = require('node:fs');
            const body = JSON.parse(fs.readFileSync('${response_file}', 'utf8'));
            process.stdout.write(String(body?.data?.purgedCount ?? 0));
          ")"

          echo "Purged ${purged_count} dead-letter item(s)"
